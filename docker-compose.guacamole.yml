version: '3.9'

services:

  guacd:
    image: guacamole/guacd
    container_name: guacd
    restart: unless-stopped
    ports:
      - "4822:4822"
    networks:
      - guacamole_net

  guacamole:
    image: guacamole/guacamole
    container_name: guacamole
    restart: unless-stopped
    depends_on:
      - guacd
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"

      # Points to local PostgreSQL on the host machine
      # Must use POSTGRESQL_ prefix — Guacamole maps postgresql-* props to POSTGRESQL_* env vars
      POSTGRESQL_HOSTNAME: host.docker.internal
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: "1234"
    networks:
      - guacamole_net

networks:
  guacamole_net:
    driver: bridge
